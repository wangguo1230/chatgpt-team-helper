version: '3.8'

services:
  app:
    build:
      context: .
    image: auto-gpt-team:latest
    # 如需强制使用远程镜像，可改回：
    # image: ghcr.io/wangguo1230/auto-gpt-team
    container_name: auto-gpt-team
    ports:
      - "${APP_HTTP_PORT:-18008}:80"   # HTTP（会 301 跳转到 HTTPS）
      - "${APP_HTTPS_PORT:-18443}:443" # HTTPS
    volumes:
      # 持久化数据库文件
      - ./data:/app/backend/db
    env_file:
      - ./backend/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_PATH: ${DATABASE_PATH:-/app/backend/db/database.sqlite}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 可选：定义网络
networks:
  default:
    driver: bridge

# 可选：定义卷
volumes:
  data:
    driver: local
